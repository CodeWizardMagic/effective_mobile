services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER}
    restart: unless-stopped
    networks:
      - effective-mobile-net  
    expose:
      - "${BACKEND_PORT}"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ${NGINX_CONTAINER}
    restart: unless-stopped
    networks:
      - effective-mobile-net
    ports:
      - "${HOST_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  effective-mobile-net:
    name: ${NETWORK_NAME}
    driver: bridge